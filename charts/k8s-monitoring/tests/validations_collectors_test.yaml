# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Validations - Collectors
templates:
  - validations.yaml
tests:
  - it: warns about collectors that are unused
    set:
      cluster: {name: test-cluster}
      collectors:
        alloy-metrics:
          extraConfig: "// Giving this Alloy something to do"
        alloy-logs:
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - failedTemplate:
          errorMessage: |-
            The alloy-logs collector is enabled, but there are no enabled features that will use it.
            Please disable the collector by removing it from the collectors list or by setting:
            collectors:
              alloy-logs:
                enabled: false

  - it: does not create resources for collectors with enabled false
    set:
      cluster: {name: test-cluster}
      collectors:
        alloy-metrics:
          extraConfig: "// Giving this Alloy something to do"
        alloy-logs:
          enabled: false
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - notFailedTemplate: {}

  - it: errors when all collectors are disabled
    set:
      cluster: {name: test-cluster}
      clusterMetrics: {enabled: true}
      collectors:
        alloy-metrics:
          enabled: false
    asserts:
      - failedTemplate:
          errorMessage: |-
            At least one collector should be enabled
            Please enable one by setting:
            collectors:
              <collector-name>:
                <collector-settings>
            See https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/collectors/README.md for more details.

  - it: errors when two collector names normalize to the same Kubernetes name
    set:
      cluster: {name: test-cluster}
      collectors:
        alloyMetrics:
          extraConfig: "// Giving this Alloy something to do"
        alloymetrics:
          extraConfig: "// This collides with alloyMetrics after normalization"
    asserts:
      - failedTemplate:
          errorMessage: |-
            Multiple collectors resolve to the same Kubernetes resource name "alloymetrics": alloyMetrics, alloymetrics
            Collector names are normalized to lowercase DNS-1123 names when used as Kubernetes resource names, so they must be unique after normalization.
            Please rename all but one of these collectors.

  - it: errors when the deprecated privileged preset is combined with a targeted host preset
    set:
      cluster: {name: test-cluster}
      collectors:
        alloy-daemon:
          presets: [privileged, host-network]
          extraConfig: "// Giving this Alloy something to do"
    asserts:
      - failedTemplate:
          errorMessage: |-
            The alloy-daemon collector combines the deprecated "privileged" preset with the "root" or "host-network" preset.
            The "privileged" preset is deprecated and cannot be combined with the "root" or "host-network" presets.
            Replace "privileged" with "root" (which sets the same securityContext) and add the host presets you need. For example:
            collectors:
              alloy-daemon:
                presets: [root, host-network, host-storage, host-cgroup, host-tracefs]

  - it: allows the deprecated privileged preset on its own
    set:
      cluster: {name: test-cluster}
      profiling: {enabled: true, ebpf: {enabled: true}, collector: alloy-profiles}
      destinations:
        pyro: {type: pyroscope, url: http://pyroscope.pyroscope.svc:4040}
      collectors:
        alloy-profiles:
          presets: [privileged, daemonset]
    asserts:
      - notFailedTemplate: {}

  - it: allows the deprecated privileged preset with the host-storage and host-cgroup presets
    set:
      cluster: {name: test-cluster}
      profiling: {enabled: true, ebpf: {enabled: true}, collector: alloy-profiles}
      destinations:
        pyro: {type: pyroscope, url: http://pyroscope.pyroscope.svc:4040}
      collectors:
        alloy-profiles:
          presets: [privileged, host-storage, host-cgroup, daemonset]
    asserts:
      - notFailedTemplate: {}
