---
cluster:
  name: standard-cluster

collectorCommon:
  alloy:
    remoteConfig:
      enabled: true
      url: https://remote-config.example.com/alloy
      auth:
        type: basic
        username: 12345
        password: my-remote-cfg-password

collectors:
  alloy-daemonset:
    presets: [large, privileged, clustered, service-discovery, filesystem-log-reader, daemonset]

  alloy-deployment:
    presets: [large, clustered, deployment]

# Add these if Kubernetes monitoring is enabled
telemetryServices:
  node-exporter:
    deploy: true

  kube-state-metrics:
    deploy: true

  beyla:
    deploy: true
    k8sCache:
      replicas: 1

  sdkInjector:
    deploy: true
    # This must match the format: system:serviceaccount:$(POD_NAMESPACE):${ReleaseName}-${CollectorName}
    allowedConfigMapWriters: system:serviceaccount:$(POD_NAMESPACE):grafana-cloud-alloy-daemonset
